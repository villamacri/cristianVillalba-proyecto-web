<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow">
        <div class="card-body p-5">
            <!-- Header -->
            <div class="mb-5">
                <h2 class="h5 fw-medium text-dark-blue mb-2">Crear Cuenta</h2>
                <p class="text-muted mb-0">Completa el formulario para registrarte</p>
            </div>

            <!-- Form -->
            <form>
                <!-- Full Name Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Nombre completo</label>
                    <input type="text" class="form-control rounded-3">
                </div>

                <!-- Email Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Correo electrónico</label>
                    <input type="email" class="form-control rounded-3">
                </div>

                <!-- Organization Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Organización (opcional)</label>
                    <input type="text" class="form-control rounded-3">
                </div>

                <!-- Password Input -->
                <div class="mb-3">
                    <label class="form-label fw-medium text-dark-blue small">Contraseña</label>
                    <input type="password" class="form-control rounded-3" >
                    <small class="text-muted">Mínimo 8 caracteres</small>
                </div>

                <!-- Confirm Password Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Confirmar contraseña</label>
                    <input type="password" class="form-control rounded-3">
                </div>

                <!-- Terms and Conditions -->
                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="terms">
                    <label class="form-check-label text-muted" for="terms">
                        Acepto los <a href="#" class="link-primary small">términos y condiciones</a> y la <a href="#" class="link-primary small">política de privacidad</a>
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100 fw-medium mb-4 rounded-3">
                    Crear Cuenta
                </button>

                <!-- Divider -->
                <div class="position-relative mb-4">
                    <hr style="border-color: #CBD5E1;">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted">o</span>
                </div>

                <!-- Login Link -->
                <div class="text-center">
                    <span class="text-muted">¿Ya tienes una cuenta?</span>
                    <a routerLink="/login" class="link-primary small ms-2">Inicia sesión</a>
                </div>
            </form>
        </div>
    </div>
</div>

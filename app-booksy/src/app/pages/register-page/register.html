<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow">
        <div class="card-body p-5">
            <div class="mb-5">
                <h2 class="h5 fw-medium text-dark-blue mb-2">Añadir Usuario</h2>
                <p class="text-muted mb-0">Crea un nuevo usuario administrador desde el panel.</p>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small" for="name">Nombre</label>
                    <input type="text" class="form-control rounded-3" id="name" name="name" formControlName="name">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small" for="last_name">Apellidos</label>
                    <input type="text" class="form-control rounded-3" id="last_name" name="last_name" formControlName="last_name">
                </div>

                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small" for="email">Correo electrónico</label>
                    <input type="email" class="form-control rounded-3" id="email" name="email" formControlName="email">
                </div>

                <div class="mb-3">
                    <label class="form-label fw-medium text-dark-blue small" for="password">Contraseña (opcional)</label>
                    <input type="password" class="form-control rounded-3" id="password" name="password" formControlName="password">
                    <small class="text-muted">Si se deja vacía, Laravel asignará una contraseña por defecto.</small>
                </div>

                @if (errorMessage) {
                    <div class="alert alert-danger mb-3">{{ errorMessage }}</div>
                }

                @if (successMessage) {
                    <div class="alert alert-success mb-3">{{ successMessage }}</div>
                }

                <button type="submit" class="btn btn-primary w-100 fw-medium mb-4 rounded-3" [disabled]="isSubmitting">
                    {{ isSubmitting ? 'Creando...' : 'Crear Usuario' }}
                </button>

                <div class="text-center">
                    <a routerLink="/usuarios" class="link-primary small">Volver al listado de usuarios</a>
                </div>
            </form>
        </div>
    </div>
</div>

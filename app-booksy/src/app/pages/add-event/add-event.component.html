<div class="p-4">
  <div class="mb-4">
    <h2 class="mb-1" style="color: #1e3a5f; font-size: 24px; font-weight: 500;">Crear Evento</h2>
    <p class="mb-0" style="color: #64748b;">Completa los datos del nuevo evento.</p>
  </div>

  <div class="card border-0 p-4" style="border-radius: 16px; border: 1px solid #cbd5e1; max-width: 760px;">
    <form [formGroup]="eventForm" (ngSubmit)="onSubmit($event)">
      <div class="d-flex flex-column gap-3">
      <div>
        <label class="form-label" for="title">Nombre del evento</label>
        <input type="text" class="form-control" formControlName="title" id="title" name="title">
      </div>

      <div>
        <label class="form-label" for="description">Descripcion</label>
        <textarea rows="3" class="form-control" formControlName="description" id="description" name="description"></textarea>
      </div>

      <div>
        <label class="form-label" for="date">Fecha</label>
        <input type="date" class="form-control" formControlName="date" id="date" name="date">
      </div>

      <div>
        <label class="form-label" for="city">Ubicacion</label>
        <input type="text" class="form-control" formControlName="city" id="city" name="city">
      </div>

      <div>
        <label class="form-label" for="max_capacity">Capacidad maxima</label>
        <input type="number" class="form-control" formControlName="max_capacity" id="max_capacity" name="max_capacity">
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger mb-0">{{ errorMessage }}</div>
      }

      <div class="d-flex gap-2 pt-2">
        <button type="submit">Guardar</button>
      </div>
      </div>
    </form>
  </div>
</div>

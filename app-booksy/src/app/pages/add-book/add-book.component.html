<div class="p-4">
  <div class="mb-4">
    <h2 class="mb-1" style="color: #1e3a5f; font-size: 24px; font-weight: 500;">Anadir Libro</h2>
    <p class="mb-0" style="color: #64748b;">Completa los datos para publicar un nuevo libro.</p>
  </div>

  <div class="card border-0 p-4" style="border-radius: 16px; border: 1px solid #cbd5e1; max-width: 760px;">
    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()" class="d-flex flex-column gap-3">
      <div>
        <label class="form-label">Titulo</label>
        <input type="text" class="form-control" formControlName="title">
      </div>

      <div>
        <label class="form-label">Autor</label>
        <input type="text" class="form-control" formControlName="author">
      </div>

      <div>
        <label class="form-label">Editorial</label>
        <input type="text" class="form-control" formControlName="publisher">
      </div>

      <div>
        <label class="form-label">Anio de Publicacion</label>
        <input type="number" class="form-control" formControlName="publication_year">
      </div>

      <div>
        <label class="form-label">Descripcion</label>
        <textarea rows="3" class="form-control" formControlName="description"></textarea>
      </div>

      <div>
        <label class="form-label">Estado Fisico</label>
        <select class="form-select" formControlName="physical_condition">
          @for (condition of physicalConditions; track condition.value) {
            <option [value]="condition.value">{{ condition.label }}</option>
          }
        </select>
      </div>

      <div>
        <label class="form-label">Tipo de Operacion</label>
        <select class="form-select" formControlName="operation_type">
          <option value="sale">Venta</option>
          <option value="exchange">Intercambio</option>
        </select>
      </div>

      <div>
        <label class="form-label">Precio</label>
        <input type="number" class="form-control" formControlName="price">
      </div>

      <div>
        <label class="form-label">Categoria (ID)</label>
        <input type="number" class="form-control" formControlName="category_id">
      </div>

      @if (errorMessage) {
        <div class="alert alert-danger mb-0">{{ errorMessage }}</div>
      }

      <div class="d-flex gap-2 pt-2">
        <button type="submit" class="btn btn-primary" style="background-color: #60a5fa; border: none;" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Guardando...' : 'Guardar' }}
        </button>
      </div>
    </form>
  </div>
</div>

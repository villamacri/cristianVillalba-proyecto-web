<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow">
        <div class="card-body p-5">
            <!-- Header -->
            <div class="mb-5">
                <h2 class="h5 fw-medium text-dark-blue mb-2">Iniciar Sesión</h2>
                <p class="text-muted mb-0">Ingresa tus credenciales para acceder al panel</p>
            </div>

            <!-- Form -->
            <form (ngSubmit)="onLogin()" autocomplete="off">
                <!-- Email Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Correo electrónico</label>
                    <input type="email" class="form-control rounded-3" [(ngModel)]="email" name="email" autocomplete="off" required>
                </div>

                <!-- Password Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Contraseña</label>
                    <input type="password" class="form-control rounded-3" [(ngModel)]="password" name="password" autocomplete="off" required>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-muted" for="remember">
                            Recordarme
                        </label>
                    </div>
                    <a href="#" class="link-primary small">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Submit Button -->
                 @if (errorMessage) {
                    <div class="alert alert-danger text-center mb-4 p-2 small">
                        {{errorMessage}}
                    </div>
                 }
                <button type="submit" class="btn btn-primary w-100 fw-medium mb-4 rounded-3">
                    Iniciar Sesión
                </button>

                <div class="text-center">
                    <span class="text-muted">Este acceso es exclusivo para administradores.</span>
                </div>
            </form>
        </div>
    </div>
</div>

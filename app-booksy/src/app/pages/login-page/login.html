<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow">
        <div class="card-body p-5">
            <!-- Header -->
            <div class="mb-5">
                <h2 class="h5 fw-medium text-dark-blue mb-2">Iniciar Sesión</h2>
                <p class="text-muted mb-0">Ingresa tus credenciales para acceder al panel</p>
            </div>

            <!-- Form -->
            <form>
                <!-- Email Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Correo electrónico</label>
                    <input type="email" class="form-control rounded-3">
                </div>

                <!-- Password Input -->
                <div class="mb-4">
                    <label class="form-label fw-medium text-dark-blue small">Contraseña</label>
                    <input type="password" class="form-control rounded-3">
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="remember">
                        <label class="form-check-label text-muted" for="remember">
                            Recordarme
                        </label>
                    </div>
                    <a href="#" class="link-primary small">¿Olvidaste tu contraseña?</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn btn-primary w-100 fw-medium mb-4 rounded-3">
                    Iniciar Sesión
                </button>

                <!-- Divider -->
                <div class="position-relative mb-4">
                    <hr style="border-color: #CBD5E1;">
                    <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted">o</span>
                </div>

                <!-- Register Link -->
                <div class="text-center">
                    <span class="text-muted">¿No tienes una cuenta?</span>
                    <a routerLink="/register" class="link-primary small ms-2">Regístrate aquí</a>
                </div>
            </form>
        </div>
    </div>
</div>
